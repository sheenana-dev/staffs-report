name: Daily Department Report

on:
  schedule:
    # 8:00 PM Philippine Time (UTC+8) = 12:00 PM UTC, Mon-Fri only
    # Note: GitHub Actions cron is best-effort and often fires 1-3h late.
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}  # manual trigger from GitHub UI

permissions:
  contents: write  # needed to push .last-run-date marker

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute report day (PHT, noon-anchored)
        id: today
        run: |
          # Anchor each run to a "report day" at noon PHT (now - 12h). Reports only
          # fire in the evening (~8 PM-1 AM PHT), so noon sits in a dead zone where
          # nothing runs — a late cron that slips past midnight is still attributed
          # to the correct day instead of stealing the next day's slot.
          today=$(TZ=Asia/Manila date -d '-12 hours' +%Y-%m-%d)
          echo "date=$today" >> "$GITHUB_OUTPUT"

      - name: Check if already ran today
        id: check
        run: |
          if [[ -f .last-run-date && "$(cat .last-run-date)" == "${{ steps.today.outputs.date }}" ]]; then
            echo "Already ran on ${{ steps.today.outputs.date }} — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: pip install python-dotenv

      - name: Send daily report
        if: steps.check.outputs.skip == 'false'
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_DATE: ${{ steps.today.outputs.date }}  # noon-anchored day; keeps content on the right day
        run: python3 tools/daily_report.py

      - name: Mark run complete
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "${{ steps.today.outputs.date }}" > .last-run-date
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .last-run-date
          git commit -m "chore: mark daily report run for ${{ steps.today.outputs.date }}"
          git push
